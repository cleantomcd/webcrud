<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:p="http://primefaces.org/ui"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <meta charset="UTF-8" />
    <title>Listagem de registros</title>
</h:head>
<h:body>
    <div class="product card">
    <h:form>
        <p:dataScroller value="#{dataScrollerView.products}" var="product" chunkSize="10" mode="inline"
                        scrollHeight="500">
            <f:facet name="header">
                Scroll Down to Load More Products
            </f:facet>

            <div class="product">
                <div class="product-list-item p-5">
                    <p:graphicImage name="demo/images/product/#{product.image}"/>
                    <div class="product-list-detail">
                        <div class="product-name"></div>
                        <div class="product-description"></div>
                        <p:rating readonly="true" value="#{product.rating}"/>
                        <i class="pi pi-tag product-category-icon"/><span
                            class="product-category"></span>
                    </div>
                    <div class="product-list-action">
                        <h:outputText styleClass="product-price">
                            <f:convertNumber currencySymbol="$" type="currency"/>
                        </h:outputText>
                        <p:commandButton value="Excluir" icon="pi pi-shopping-cart">
                        </p:commandButton>
                         <p:commandButton value="Editar" icon="pi pi-shopping-cart">
                        </p:commandButton>
                    </div>
                </div>
            </div>
        </p:dataScroller>
    </h:form>
</div>
</h:body>
</html>
